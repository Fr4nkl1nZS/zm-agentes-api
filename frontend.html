<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZM Deportes - Asistente</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #chat-container {
            width: 700px;
            max-width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 80vh;
            max-height: 700px;
        }
        #chat-header {
            background: #FE5915;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        #chat-header span {
            font-size: 1.8rem;
        }
        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #fafafa;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }
        .user-message {
            background: #FE5915;
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        .agent-message {
            background: #e9ecef;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            white-space: pre-wrap;
        }
        #chat-input-area {
            display: flex;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #eee;
            gap: 10px;
        }
        #chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        #chat-input:focus {
            border-color: #FE5915;
        }
        #send-button {
            background: #FE5915;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 25px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 1rem;
        }
        #send-button:hover {
            background: #d94a0f;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .typing-indicator {
            display: inline-block;
            background: #e9ecef;
            padding: 12px 18px;
            border-radius: 20px;
            color: #666;
            font-style: italic;
        }
        #chat-messages {
            display: flex;
            flex-direction: column;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            align-self: center;
            text-align: center;
            max-width: 90%;
        }
    </style>
</head>
<body>
    <div id="chat-container">
        <div id="chat-header">
            <span>🤖</span> ZM Deportes - Asistente Inteligente
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input id="chat-input" type="text" placeholder="Escribe tu mensaje..." autofocus>
            <button id="send-button">Enviar</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('chat-messages');
        const input = document.getElementById('chat-input');
        const sendButton = document.getElementById('send-button');

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message');
            if (sender === 'user') {
                messageDiv.classList.add('user-message');
                messageDiv.textContent = text;
            } else if (sender === 'agent') {
                messageDiv.classList.add('agent-message');
                messageDiv.textContent = text;
            } else if (sender === 'error') {
                messageDiv.classList.add('message', 'error-message');
                messageDiv.textContent = '❌ ' + text;
            }
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.classList.add('typing-indicator');
            typingDiv.id = 'typing-indicator';
            typingDiv.textContent = '🤖 Escribiendo...';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            // Mostrar mensaje del usuario
            addMessage(message, 'user');
            input.value = '';
            input.disabled = true;
            sendButton.disabled = true;

            // Mostrar indicador de escritura
            showTyping();

            try {
                const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto: message })
                });

                removeTyping();

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Error en el servidor');
                }

                const data = await response.json();
                addMessage(data.respuesta || 'No recibí respuesta del agente.', 'agent');

            } catch (error) {
                removeTyping();
                console.error('Error:', error);
                addMessage('No se pudo conectar con el servidor. Asegúrate de que la API esté corriendo en http://127.0.0.1:8000', 'error');
            } finally {
                input.disabled = false;
                sendButton.disabled = false;
                input.focus();
            }
        }

        // Eventos
        sendButton.addEventListener('click', sendMessage);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Mensaje de bienvenida
        addMessage('¡Hola! Soy el asistente de ZM Deportes. ¿En qué puedo ayudarte hoy?', 'agent');
    </script>
</body>
</html>
